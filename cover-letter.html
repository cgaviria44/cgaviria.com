<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Christian Gaviria — Cover Letter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #fff;
  color: #1a1a1a;
  line-height: 1.6;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

.page {
  max-width: 760px;
  margin: 0 auto;
  padding: 56px 40px 80px;
  transition: opacity 0.15s ease;
}
.page.fading { opacity: 0; }

/* ── Language switch ── */
.lang-switch {
  position: fixed;
  top: 20px;
  right: 24px;
  display: flex;
  gap: 2px;
  z-index: 100;
}
.lang-switch button {
  background: none;
  border: none;
  border-bottom: 1.5px solid transparent;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 4px 8px;
  cursor: pointer;
  color: #bbb;
  transition: all 0.12s;
}
.lang-switch button.active { color: #111; border-bottom-color: #111; }
.lang-switch button:hover:not(.active) { color: #666; }

/* ── Header ── */
.cl-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid #e8e8e8;
  margin-bottom: 32px;
}
.cl-header-main { flex: 1; min-width: 0; }
.cl-name {
  font-size: clamp(22px, 4vw, 30px);
  font-weight: 700;
  color: #0f0f0f;
  letter-spacing: -0.4px;
  line-height: 1.2;
  margin-bottom: 5px;
}
.cl-title {
  font-size: 14px;
  color: #666;
  margin-bottom: 16px;
  font-weight: 400;
}
.cl-contact {
  font-size: 13px;
  color: #555;
  line-height: 1.8;
}
.cl-contact a { color: #555; text-decoration: none; }
.cl-contact a:hover { color: #111; text-decoration: underline; }
.cl-contact-sep { margin: 0 7px; color: #ccc; }
.avatar {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: #fff;
}
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center top;
  display: block;
}

/* ── Body ── */
.cl-meta {
  margin-bottom: 32px;
}
.cl-date {
  font-size: 13px;
  color: #888;
  margin-bottom: 16px;
}
.cl-to {
  font-size: 14px;
  color: #333;
  line-height: 1.7;
}
.cl-to strong { color: #111; }

.cl-subject {
  font-size: 15px;
  font-weight: 600;
  color: #111;
  margin-bottom: 28px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ebebeb;
}

.cl-body p {
  font-size: 14px;
  color: #333;
  line-height: 1.85;
  margin-bottom: 20px;
  text-align: justify;
  hyphens: auto;
}
.cl-body p:last-child { margin-bottom: 0; }

.cl-sign {
  margin-top: 36px;
  font-size: 14px;
  color: #333;
  line-height: 1.8;
}
.cl-sign strong { color: #111; font-weight: 600; }

/* ── Placeholder highlight ── */
.placeholder {
  background: #fff8e1;
  border-radius: 3px;
  padding: 0 3px;
  color: #b45309;
  font-style: italic;
  font-weight: 500;
}

/* ── Download ── */
.cl-download {
  margin-top: 28px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 16px;
  font-size: 13px;
}
.cl-download a {
  color: #555;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.cl-download a:hover { color: #111; text-decoration: underline; }
.cl-download svg { width: 13px; height: 13px; flex-shrink: 0; }

/* ── Footer ── */
footer {
  margin-top: 48px;
  padding-top: 16px;
  border-top: 1px solid #ebebeb;
  font-size: 12px;
  color: #bbb;
}

@media print {
  .cl-download { display: none !important; }
}

/* ── Responsive ── */
@media (max-width: 580px) {
  .page { padding: 40px 20px 60px; }
  .lang-switch { top: 14px; right: 16px; }
  .cl-header { flex-direction: column-reverse; }
  .avatar { width: 60px; height: 60px; }
}

/* ── Print ── */
@media print {
  .lang-switch, .cl-download { display: none !important; }
  body { font-size: 11px; }
  .page { padding: 20px; max-width: 100%; }
  .placeholder { background: none; color: #b45309; }
}

::selection { background: #111; color: #fff; }
</style>
</head>
<body>

<div class="lang-switch" role="group" aria-label="Language">
  <button id="btn-en" class="active" type="button" aria-pressed="true">EN</button>
  <button id="btn-es" type="button" aria-pressed="false">ES</button>
</div>

<div class="page" id="content-root">

  <header class="cl-header">
    <div class="cl-header-main">
      <div class="cl-name">Christian Camilo Gaviria Castro</div>
      <div class="cl-title" id="cl-title"></div>
      <div class="cl-contact">
        <a href="mailto:me@cgaviria.com">me@cgaviria.com</a>
        <span class="cl-contact-sep">·</span>
        <a href="https://linkedin.com/in/cgaviria44" target="_blank" rel="noopener">linkedin.com/in/cgaviria44</a>
        <span class="cl-contact-sep">·</span>
        <a href="https://cv.cgaviria.com" target="_blank" rel="noopener">cv.cgaviria.com</a>
        <span class="cl-contact-sep">·</span>
        <span id="cl-location"></span>
      </div>
      <div class="cl-download" style="margin-top:14px;">
        <a href="cover-letter_en.pdf" download="Christian_Gaviria_CoverLetter_EN.pdf">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PDF (EN)
        </a>
        <a href="cover-letter_es.pdf" download="Christian_Gaviria_CoverLetter_ES.pdf">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PDF (ES)
        </a>
      </div>
    </div>
    <div class="avatar">
      <img src="photo.jpg" alt="Christian Camilo Gaviria Castro" />
    </div>
  </header>

  <div class="cl-meta">
    <div class="cl-date" id="cl-date"></div>
    <div class="cl-to">
      <strong id="cl-to-label"></strong><br>
      Hiring Manager<br>
      Tailscale
    </div>
  </div>

  <div class="cl-subject" id="cl-subject"></div>

  <div class="cl-body" id="cl-body"></div>

  <div class="cl-sign" id="cl-sign"></div>

  <footer id="cl-footer"></footer>

</div>

<script>
const today = new Date();
const enDate = today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
const esDate = today.toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' });

const I18N = {
  en: {
    title: 'Sr. Site Reliability Engineer & Technical Leader · Kubernetes · AWS · Cloud-Native · GNU/Linux · DevOps · Platform Engineering',
    location: 'Medellín, Colombia (GMT-5)',
    date: enDate,
    toLabel: 'To:',
    subject: 'Re: Application for Infrastructure Engineer at Tailscale',
    body: `
      <p>Dear Hiring Manager,</p>
      <p>I am applying for the Infrastructure Engineer role at <strong>Tailscale</strong>. With over 9 years designing and operating cloud-native infrastructure at scale, and currently serving as Sr. Site Reliability Engineer and technical leader at a US-based intelligent cloud infrastructure company, I am eager to bring that depth to a team building the future of secure networking.</p>
      <p>In my current role, I own the reliability engineering and platform strategy for a hybrid cloud serving businesses across the Americas. My day-to-day spans advanced Kubernetes workloads (Cilium, Rook Ceph, Velero), multi-cloud environments on AWS, GCP, and Azure, infrastructure automation with Terraform and Ansible, and end-to-end observability using Prometheus, Grafana, and OpenTelemetry. I drive DevSecOps practices across the platform — vulnerability scanning, IAM hardening, secrets management — and integrate AI tooling into runbooks and postmortems to continuously raise the reliability bar.</p>
      <p>What draws me to Tailscale is its approach to distributed mesh networking — building an overlay network that is agnostic to the underlying infrastructure, so any two machines can communicate securely and directly regardless of their location or network environment. I actively use Tailscale in my own infrastructure, and the ease it brings to machine-to-machine communication is something I rely on every day. My background includes BGP, IPv6, and network security — the same foundations that WireGuard and Tailscale's mesh model are built on. I have spoken at KCD Colombia 2025 and FLISOL Medellín on cloud-native and infrastructure topics, led a network and security research group at ITM for four years, and serve as the bilingual (EN/ES) technical bridge between engineering and US-based stakeholders.</p>
      <p>I would welcome the opportunity to discuss how I can contribute to Tailscale's infrastructure. My full CV is available at <a href="https://cv.cgaviria.com" target="_blank" rel="noopener">cv.cgaviria.com</a>, and I am happy to provide additional context or references on request.</p>
      <p>Thank you for your consideration.</p>
    `,
    signOff: 'Sincerely,',
    signName: 'Christian Camilo Gaviria Castro',
    signContact: 'me@cgaviria.com · Medellín, Colombia',
    footer: ''
  },
  es: {
    title: 'Sr. Site Reliability Engineer y Líder Técnico · Kubernetes · AWS · Cloud-Native · GNU/Linux · DevOps · Platform Engineering',
    location: 'Medellín, Colombia (GMT-5)',
    date: esDate,
    toLabel: 'Para:',
    subject: 'Ref: Aplicación para Infrastructure Engineer en Tailscale',
    body: `
      <p>Estimado/a Hiring Manager,</p>
      <p>Me postulo para el cargo de Infrastructure Engineer en <strong>Tailscale</strong>. Con más de 9 años diseñando y operando infraestructura cloud-native a escala, y actualmente como Sr. Site Reliability Engineer y líder técnico en una empresa de infraestructura cloud con base en EE.UU., estoy entusiasmado por llevar esa profundidad a un equipo que construye el futuro de las redes seguras.</p>
      <p>En mi rol actual soy responsable de la ingeniería de confiabilidad y la estrategia de plataforma de una nube híbrida que sirve a empresas en todo el continente americano. Mi trabajo diario abarca cargas avanzadas de Kubernetes (Cilium, Rook Ceph, Velero), entornos multi-cloud en AWS, GCP y Azure, automatización de infraestructura con Terraform y Ansible, y observabilidad integral con Prometheus, Grafana y OpenTelemetry. Impulso prácticas DevSecOps en toda la plataforma — escaneo de vulnerabilidades, hardening de IAM, gestión de secretos — e integro herramientas de IA en runbooks y postmortems para elevar continuamente el nivel de confiabilidad.</p>
      <p>Lo que me atrae de Tailscale es su enfoque en redes distribuidas en malla — construyendo una red superpuesta agnóstica a la infraestructura subyacente, de modo que cualquier par de máquinas pueda comunicarse de forma segura y directa sin importar su ubicación o entorno de red. Uso Tailscale activamente en mi propia infraestructura, y la facilidad que aporta a la comunicación entre máquinas es algo en lo que confío a diario. Mi experiencia incluye BGP, IPv6 y seguridad de redes — los mismos fundamentos sobre los que se construyen WireGuard y el modelo mesh de Tailscale. He sido ponente en KCD Colombia 2025 y FLISOL Medellín sobre temas de infraestructura y cloud-native, lideré un semillero de investigación en redes y seguridad en el ITM durante cuatro años, y sirvo como puente técnico bilingüe (EN/ES) entre equipos de ingeniería y clientes en EE.UU.</p>
      <p>Me gustaría tener la oportunidad de conversar sobre cómo puedo contribuir a la infraestructura de Tailscale. Mi CV completo está disponible en <a href="https://cv.cgaviria.com" target="_blank" rel="noopener">cv.cgaviria.com</a>, y con gusto suministro contexto adicional o referencias a solicitud.</p>
      <p>Gracias por su tiempo y consideración.</p>
    `,
    signOff: 'Cordialmente,',
    signName: 'Christian Camilo Gaviria Castro',
    signContact: 'me@cgaviria.com · Medellín, Colombia',
    footer: ''
  }
};

function applyLang(lang) {
  const t = I18N[lang];

  document.getElementById('cl-title').textContent = t.title;
  document.getElementById('cl-location').textContent = t.location;
  document.getElementById('cl-date').textContent = t.date;
  document.getElementById('cl-to-label').textContent = t.toLabel;
  document.getElementById('cl-subject').innerHTML = t.subject;
  document.getElementById('cl-body').innerHTML = t.body;
  document.getElementById('cl-sign').innerHTML = `
    <div>${t.signOff}</div>
    <div style="margin-top:24px;"><strong>${t.signName}</strong></div>
    <div style="color:#666; font-size:13px; margin-top:2px;">${t.signContact}</div>
  `;
  document.getElementById('cl-footer').textContent = t.footer;
  document.getElementById('html-root').lang = lang;

  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-en').setAttribute('aria-pressed', lang === 'en');
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
  document.getElementById('btn-es').setAttribute('aria-pressed', lang === 'es');

  try { localStorage.setItem('cgaviria-cl-lang', lang); } catch(e) {}
}

document.addEventListener('DOMContentLoaded', () => {
  let initLang = 'en';
  try {
    const urlLang = new URLSearchParams(window.location.search).get('lang');
    if (urlLang === 'en' || urlLang === 'es') initLang = urlLang;
    else {
      const saved = localStorage.getItem('cgaviria-cl-lang');
      if (saved === 'en' || saved === 'es') initLang = saved;
      else if (navigator.language && navigator.language.toLowerCase().startsWith('es')) initLang = 'es';
    }
  } catch(e) {}

  applyLang(initLang);

  function switchTo(lang) {
    const root = document.getElementById('content-root');
    root.classList.add('fading');
    setTimeout(() => { applyLang(lang); root.classList.remove('fading'); }, 150);
  }

  document.getElementById('btn-en').addEventListener('click', () => switchTo('en'));
  document.getElementById('btn-es').addEventListener('click', () => switchTo('es'));
});
</script>

</body>
</html>
